<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FAT/SAT Mängelliste</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f4f7;
}

header{
    background:#ffffff;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

h1{
    margin:0;
}

.container{
    padding:15px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

input,
textarea,
select{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    margin-top:8px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    border:none;
    border-radius:10px;
    padding:14px;
    font-size:16px;
    cursor:pointer;
}

.primary{
    background:#007aff;
    color:white;
    width:100%;
}

.delete{
    background:#ff3b30;
    color:white;
}

img.preview{
    width:100%;
    max-width:350px;
    border-radius:10px;
    margin-top:10px;
}

.dashboard{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.badge{
    background:white;
    padding:10px;
    border-radius:10px;
    min-width:120px;
    text-align:center;
}

.progress{
    width:100%;
    height:18px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    background:#28a745;
    width:0%;
}
</style>

</head>

<body>

<header>
<h1>FAT / SAT Mängelliste</h1>
</header>

<div class="container">

<div class="card">

<h3>Stammdaten</h3>

<select id="abnahmeart">
<option>FAT</option>
<option>SAT</option>
</select>

<input id="ersteller" placeholder="Ersteller">

<input id="datum" type="date">

<input id="anlage" placeholder="Anlagenbezeichnung">

<input id="lieferant" placeholder="Lieferant">

</div>

<div class="card">

<h3>Dashboard</h3>

<div class="dashboard">

<div class="badge">
<div id="offen">0</div>
<div>Offen</div>
</div>

<div class="badge">
<div id="erledigt">0</div>
<div>Erledigt</div>
</div>

<div class="badge">
<div id="gesamt">0</div>
<div>Gesamt</div>
</div>

</div>

<br>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

</div>

<button class="primary" onclick="neuerMangel()">
+ Neuer Mangel
</button>

<br><br>
<br><br>

<button onclick="exportPDF()" class="primary">
📄 PDF Export
</button>

<br><br>

<button onclick="exportExcel()" class="primary">
📊 Excel Export
</button>

<br><br>
<div id="maengel"></div>
<div class="card">
</div>

<script>

let nummer = 0;

function speichern(){
    localStorage.setItem(
        "maengelliste",
        document.getElementById("maengel").innerHTML
    );
}

function dashboardAktualisieren(){

    const cards =
    document.querySelectorAll(".mangel");

    let offen = 0;
    let erledigt = 0;

    cards.forEach(card=>{

        const status =
        card.querySelector(".status").value;

        if(status==="Erledigt"){
            erledigt++;
        }else{
            offen++;
        }

    });

    document.getElementById("offen").innerText = offen;
    document.getElementById("erledigt").innerText = erledigt;
    document.getElementById("gesamt").innerText =
    cards.length;

    const percent =
    cards.length === 0
    ? 0
    : erledigt/cards.length*100;

    document.getElementById("progressBar")
    .style.width = percent + "%";
}

function bildLaden(input){

    const file = input.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){

        const img =
        input.parentElement
        .querySelector(".preview");

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
}

function loeschen(button){

    button.parentElement.remove();

    dashboardAktualisieren();
    speichern();
}

function neuerMangel(){

    nummer++;

    const div =
    document.createElement("div");

    div.className = "card mangel";

    div.innerHTML = `

    <h3>Mangel ${nummer}</h3>

    <select class="status"
        onchange="dashboardAktualisieren()">

        <option>Offen</option>
        <option>In Bearbeitung</option>
        <option>Erledigt</option>

    </select>

    <select>
        <option>Kritisch</option>
        <option>Hoch</option>
        <option>Mittel</option>
        <option>Niedrig</option>
    </select>

    <input
    placeholder="Verantwortlicher">

    <input
    type="date">

    <textarea
    rows="4"
    placeholder="Mangelbeschreibung">
    </textarea>

    <input
    type="file"
    accept="image/*">

    <img class="preview">

    <button
        class="delete"
        onclick="loeschen(this)">
        Löschen
    </button>
    `;

    const upload =
    div.querySelector("input[type=file]");

    upload.addEventListener(
        "change",
        function(){
            bildLaden(this);
        }
    );

    document
    .getElementById("maengel")
    .appendChild(div);

    dashboardAktualisieren();
    speichern();
}

document.getElementById("datum").value =
new Date().toISOString().split("T")[0];
async function exportPDF(){

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF();

    pdf.setFontSize(18);

    pdf.text(
        "FAT / SAT Maengelliste",
        10,
        20
    );

    let y = 40;

    document
        .querySelectorAll(".mangel")
        .forEach((m,index)=>{

        const inputs =
        m.querySelectorAll(
            "input,textarea,select"
        );

        pdf.text(
            "Mangel " + (index+1),
            10,
            y
        );

        y += 8;

        pdf.text(
            "Status: " +
            inputs[0].value,
            10,
            y
        );

        y += 8;

        pdf.text(
            "Prioritaet: " +
            inputs[1].value,
            10,
            y
        );

        y += 8;

        pdf.text(
            "Beschreibung: " +
            inputs[4].value,
            10,
            y
        );

        y += 20;

        if(y > 260){

            pdf.addPage();
            y = 20;

        }

    });

    pdf.save("Maengelliste.pdf");
}
function exportExcel(){

    const data = [];

    document
      .querySelectorAll(".mangel")
      .forEach((m,index)=>{

      const inputs =
      m.querySelectorAll(
        "input,textarea,select"
      );

      data.push({

        Nummer:index+1,
        Status:inputs[0].value,
        Prioritaet:inputs[1].value,
        Verantwortlich:inputs[2].value,
        Faelligkeit:inputs[3].value,
        Beschreibung:inputs[4].value

      });

    });

    const ws =
    XLSX.utils.json_to_sheet(
      data
    );

    const wb =
    XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
      wb,
      ws,
      "Maengel"
    );

    XLSX.writeFile(
      wb,
      "Maengelliste.xlsx"
    );
}
function initCanvas(id){

    const canvas =
    document.getElementById(id);

    const ctx =
    canvas.getContext("2d");

    let painting = false;

    function start(e){

        painting = true;

        const rect =
        canvas.getBoundingClientRect();

        ctx.beginPath();

        ctx.moveTo(
            e.touches ?
            e.touches[0].clientX - rect.left :
            e.offsetX,

            e.touches ?
            e.touches[0].clientY - rect.top :
            e.offsetY
        );
    }

    function draw(e){

        if(!painting) return;

        const rect =
        canvas.getBoundingClientRect();

        ctx.lineWidth = 2;

        ctx.lineTo(
            e.touches ?
            e.touches[0].clientX - rect.left :
            e.offsetX,

            e.touches ?
            e.touches[0].clientY - rect.top :
            e.offsetY
        );

        ctx.stroke();
    }

    function stop(){
        painting = false;
    }

    canvas.addEventListener(
        "mousedown",
        start
    );

    canvas.addEventListener(
        "mousemove",
        draw
    );

    canvas.addEventListener(
        "mouseup",
        stop
    );

    canvas.addEventListener(
        "touchstart",
        start
    );

    canvas.addEventListener(
        "touchmove",
        draw
    );

    canvas.addEventListener(
        "touchend",
        stop
    );
}

function clearCanvas(id){

    const canvas =
    document.getElementById(id);

    canvas
        .getContext("2d")
        .clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );
}

//initCanvas("kundeSign");
//initCanvas("lieferantSign");



</script>

</body>
</html>
